services:
  postgres:
    image: postgres:18.3-alpine3.22
    container_name: dj-tools-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dj_tools}
      POSTGRES_USER: ${POSTGRES_USER:-djtools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djtools} -d ${POSTGRES_DB:-dj_tools}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: dj-tools-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-shendongjuns}/dj-tools-server:${IMAGE_TAG:-latest}
    container_name: dj-tools-server
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dj_tools}
      POSTGRES_USER: ${POSTGRES_USER:-djtools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-dj-tools-attachments}
      CORS_ENABLED: ${CORS_ENABLED:-false}
      WEB_ORIGIN: ${WEB_ORIGIN}
      WEB_ORIGIN_DOCKER: http://web
      DOCKER_HOST: unix:///var/run/docker.sock
      LOG_FILE_PATH: /app/logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs/server:/app/logs

  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-shendongjuns}/dj-tools-web:${IMAGE_TAG:-latest}
    container_name: dj-tools-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${WEB_PORT:-8088}:80"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
