# 允许容器外部与同 Compose 网络内的其他服务访问 PostgreSQL。
listen_addresses = '*'
port = 5432

# 连接与内存：采用适合个人工作台单机部署的保守默认值。
max_connections = 100
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 64MB
wal_buffers = 16MB

# WAL 与检查点：兼顾写入稳定性和磁盘抖动控制。
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 1GB

# 查询规划：对 PostgreSQL 在 SSD / 云盘场景下更友好。
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200
huge_pages = off

# 日志：保留关键慢 SQL 和锁等待信息，便于后续定位性能问题。
logging_collector = off
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_min_duration_statement = 1000
